<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart DCA Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🛡️ Smart DCA Dashboard</a>
            <div class="d-flex align-items-center">
                <span id="wallet-status" class="badge bg-secondary me-2">Disconnected</span>
                <button id="connect-btn" class="btn btn-outline-light btn-sm">Connect Wallet</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Policy Registration Form -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">Register DCA Policy</h5>
                    </div>
                    <div class="card-body">
                        <form id="register-form">
                            <div class="mb-3">
                                <label for="fundingAsset" class="form-label">Funding Asset</label>
                                <select id="fundingAsset" class="form-select">
                                    <option value="USDC">USDC</option>
                                    <option value="ETH">ETH</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="targetConstraints" class="form-label">Target Asset Constraints</label>
                                <input type="text" id="targetConstraints" class="form-control" placeholder="e.g. BTC, ETH, SOL" value="ETH" required>
                            </div>
                            <div class="mb-3">
                                <label for="nominalSpend" class="form-label">Nominal Spend Amount</label>
                                <input type="number" id="nominalSpend" class="form-control" value="10" required>
                            </div>
                            <div class="mb-3">
                                <label for="cadence" class="form-label">Cadence (seconds)</label>
                                <input type="number" id="cadence" class="form-control" value="60" required>
                            </div>
                            <div class="mb-3">
                                <label for="slippage" class="form-label">Slippage Limit (bps)</label>
                                <input type="number" id="slippage" class="form-control" value="100" required>
                            </div>
                            <div class="mb-3">
                                <label for="strategyProfile" class="form-label">AI Strategy Profile</label>
                                <textarea id="strategyProfile" class="form-control" rows="3" placeholder="AI analysis rules..." required>Analyze social sentiment, liquidity depth, and buy momentum. Only buy if liquidity > 50000 USD.</textarea>
                            </div>
                            <button type="submit" id="register-submit-btn" class="btn btn-primary w-100">Register Policy</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Policies and Queue Management -->
            <div class="col-md-8">
                <!-- Policies Card -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">Active DCA Policies</h5>
                        <button class="btn btn-light btn-sm" onclick="loadPolicies()">🔄 Refresh</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Assets</th>
                                        <th>Spend</th>
                                        <th>Cadence</th>
                                        <th>Status</th>
                                        <th>Flags/Reason</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="policies-tbody">
                                    <tr><td colspan="7" class="text-center text-muted">Please connect your wallet first.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Queue Card -->
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">Execution Queue</h5>
                        <button class="btn btn-light btn-sm" onclick="loadQueue()">🔄 Refresh</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Policy ID</th>
                                        <th>Next Due</th>
                                        <th>Retry Due</th>
                                        <th>Quarantine Status</th>
                                        <th>Quarantine Reason</th>
                                    </tr>
                                </thead>
                                <tbody id="queue-tbody">
                                    <tr><td colspan="5" class="text-center text-muted">Please connect your wallet first.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Placeholder for GenLayer SDK -->
    <script src="https://cdn.jsdelivr.net/npm/genlayer-js@1.0.0-alpha.5/dist/index.global.js" onerror="console.warn('Fallback to local SDK load.')"></script>
    <script src="app.js"></script>
</body>
</html>
